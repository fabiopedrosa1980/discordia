<section class="feed">
  <div class="feed-label">— feed ao vivo</div>

  @if (posts().length === 0) {
    <div class="empty-state">
      <span class="empty-icon">✦</span>
      <p>Nenhum post ainda. Seja o primeiro!</p>
    </div>
  }

  @for (post of posts(); track trackById($index, post)) {
    <app-post-card
      [post]="post"
      (liked)="onLike($event)"
      (reposted)="onRepost($event)"
    />
  }
</section>
